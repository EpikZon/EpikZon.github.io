<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpikZon Official Site</title>
    <style id="site-styles">
        /* Main Website Styles */
        body { font-family: sans-serif; background: #121212; color: #ffffff; text-align: center; padding: 50px 20px; margin: 0; }
        h1 { color: #00ffcc; }
        p { font-size: 1.2rem; color: #aaaaaa; }
        
        /* Layout Hubs */
        .hub-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .image-tab { background: #222; border: 1px solid #333; padding: 15px; border-radius: 8px; width: 250px; }
        .image-tab img { max-width: 100%; border-radius: 4px; display: block; margin-bottom: 10px; }
        .image-tab a { color: #00ffcc; text-decoration: none; font-weight: bold; }

        /* Admin Panels */
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border: 20px solid #111; border-radius: 10px; z-index: 1000; text-align: left; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .modal input, .modal select { display: block; width: 90%; margin: 10px 0; padding: 8px; background: #333; color: #fff; border: 1px solid #444; }
        .modal button { background: #00ffcc; color: #000; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        #admin-controls { display: none; background: #1a1a1a; border: 2px dashed #00ffcc; padding: 20px; margin-bottom: 30px; border-radius: 8px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <!-- Main Website Content -->
    <h1 id="site-title">EPIKZON OFFICIAL SITE</h1>
    <p id="site-desc">Welcome to my official corner of the internet.</p>
    
    <!-- Image Tabs & Hubs Container -->
    <div class="hub-container" id="hub-container">
        <!-- New items will appear here automatically when you add them -->
        <div class="image-tab">
            <img src="https://unsplash.com" alt="Sample">
            <a href="https://github.com" target="_blank">Sample Project Link</a>
        </div>
    </div>

    <!-- Hidden Admin Dashboard Controls -->
    <div id="admin-controls">
        <h3>⚡ Owner Panel (Logged in as epiksoftwarezz)</h3>
        
        <h4>1. Quick Style Changer</h4>
        <button onclick="changeStyle('neon')">Neon Theme</button>
        <button onclick="changeStyle('matrix')">Matrix Theme</button>
        <button onclick="changeStyle('dark')">Default Dark</button>

        <h4>2. Add Image Tab / Hub Link</h4>
        <input type="text" id="img-url" placeholder="Paste Embed Image URL here">
        <input type="text" id="link-url" placeholder="Paste Destination Link URL here">
        <input type="text" id="link-text" placeholder="Link Text Title">
        <button onclick="addNewTab()">Add to Website</button>
    </div>

    <!-- Login Button & Popup Window -->
    <button class="admin-btn" onclick="openLogin()">Owner Login</button>

    <div id="login-modal" class="modal">
        <h3>Owner Authentication</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkCredentials()">Login</button>
        <button onclick="closeLogin()" style="background:#555; color:#fff; margin-left:10px;">Cancel</button>
    </div>

    <!-- Logic Script (No Coding Needed From You) -->
    <script>
        function openLogin() { document.getElementById('login-modal').style.display = 'block'; }
        function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }

        function checkCredentials() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            // Checks for your exact requested user and pass
            if(u === "epiksoftwarezz" && p === "NewSuperEpikZon124") {
                alert("Access Granted, Owner!");
                document.getElementById('admin-controls').style.display = 'block';
                closeLogin();
            } else {
                alert("Incorrect username or password.");
            }
        }

        // Feature: Add Image Tabs with embedded links
        function addNewTab() {
            const img = document.getElementById('img-url').value;
            const link = document.getElementById('link-url').value;
            const text = document.getElementById('link-text').value;

            if(!img || !link || !text) {
                alert("Please fill out all fields!");
                return;
            }

            const container = document.getElementById('hub-container');
            const newTab = document.createElement('div');
            newTab.className = 'image-tab';
            newTab.innerHTML = `<img src="${img}"><a href="${link}" target="_blank">${text}</a>`;
            
            container.appendChild(newTab);
            
            // Clear inputs
            document.getElementById('img-url').value = '';
            document.getElementById('link-url').value = '';
            document.getElementById('link-text').value = '';
        }

        // Feature: Edit Website Style Options
        function changeStyle(theme) {
            const body = document.body;
            const title = document.getElementById('site-title');
            if(theme === 'neon') {
                body.style.background = '#0d001a';
                body.style.color = '#ff007f';
                title.style.color = '#00ffff';
            } else if(theme === 'matrix') {
                body.style.background = '#000000';
                body.style.color = '#00ff00';
                title.style.color = '#00ff00';
                body.style.fontFamily = 'monospace';
            } else if(theme === 'dark') {
                body.style.background = '#121212';
                body.style.color = '#ffffff';
                title.style.color = '#00ffcc';
                body.style.fontFamily = 'sans-serif';
            }
        }
    </script>
</body>
</html>
